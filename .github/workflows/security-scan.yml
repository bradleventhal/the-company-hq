name: Skill Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-scan:
    name: Snyk Agent Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run mcp-scan on skill
        run: uvx mcp-scan@latest --skills skill/SKILL.md --json > scan-results.json

      - name: Check scan results
        run: |
          python3 -c "
          import json, sys
          with open('scan-results.json') as f:
              results = json.load(f)
          issues = results.get('issues', [])
          critical = [i for i in issues if i.get('severity') in ('critical', 'high')]
          if critical:
              print('FAILED: Found critical/high severity issues:')
              for i in critical:
                  print(f\"  - [{i.get('severity')}] {i.get('message', 'unknown')}\")
              sys.exit(1)
          print(f'PASSED: No critical/high issues found ({len(issues)} total issues)')
          "

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-scan-results
          path: scan-results.json
